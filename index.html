<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Manjari', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .step { display: none; }
        .step.active { display: block; }
        h2 { text-align: center; color: #1a5f7a; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        
        /* PDF-ൽ കാണാൻ വേണ്ടിയുള്ള സ്റ്റൈൽ */
        #displayArea { display: none; padding: 20px; border: 2px solid #000; }
        .pdf-row { margin-bottom: 15px; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <div id="inputForm">
        <h2>അഡ്മിഷൻ ഫോം</h2>

        <div class="step active" id="step1">
            <label>കുട്ടിയുടെ പേര്:</label>
            <input type="text" id="studentName" placeholder="പേര് ടൈപ്പ് ചെയ്യുക">
            <button onclick="nextStep(2)">Next</button>
        </div>

        <div class="step" id="step2">
            <label>രക്ഷിതാവിന്റെ പേര്:</label>
            <input type="text" id="parentName" placeholder="രക്ഷിതാവിന്റെ പേര്">
            <button onclick="nextStep(3)">Next</button>
        </div>

        <div class="step" id="step3">
            <label>ഫോൺ നമ്പർ:</label>
            <input type="tel" id="phoneNumber" placeholder="ഫോൺ നമ്പർ">
            <button id="finishBtn" onclick="generatePDF()">Submit & WhatsApp</button>
        </div>
    </div>

    <div id="displayArea">
        <h2 style="text-align:center; color:#1a5f7a;">അഡ്മിഷൻ വിവരങ്ങൾ</h2>
        <hr>
        <div class="pdf-row"><b>കുട്ടിയുടെ പേര്:</b> <span id="pStudentName"></span></div>
        <div class="pdf-row"><b>രക്ഷിതാവിന്റെ പേര്:</b> <span id="pParentName"></span></div>
        <div class="pdf-row"><b>ഫോൺ നമ്പർ:</b> <span id="pPhoneNumber"></span></div>
        <p style="text-align:center; font-size:12px; margin-top:50px;">ഈ ഫോം ഓൺലൈൻ വഴി പൂരിപ്പിച്ചതാണ്.</p>
    </div>
</div>

<script>
    function nextStep(step) {
        const current = document.querySelector('.step.active');
        const input = current.querySelector('input');
        if (input.value.trim() === "") { alert("ദയവായി പൂരിപ്പിക്കുക"); return; }
        
        current.classList.remove('active');
        document.getElementById('step' + step).classList.add('active');
    }

    function generatePDF() {
        const sName = document.getElementById('studentName').value;
        const pName = document.getElementById('parentName').value;
        const phone = document.getElementById('phoneNumber').value;

        if (phone.trim() === "") { alert("ഫോൺ നമ്പർ നൽകുക"); return; }

        // ഇൻപുട്ട് വാല്യൂസ് PDF ഏരിയയിലേക്ക് മാറ്റുന്നു
        document.getElementById('pStudentName').innerText = sName;
        document.getElementById('pParentName').innerText = pName;
        document.getElementById('pPhoneNumber').innerText = phone;

        // PDF എടുക്കേണ്ട ഭാഗം കാണിക്കുന്നു
        const element = document.getElementById('displayArea');
        element.style.display = 'block';

        const opt = {
            margin: 15,
            filename: sName + '_Admission.pdf',
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            element.style.display = 'none'; // PDF എടുത്തു കഴിഞ്ഞാൽ വീണ്ടും മറയ്ക്കുന്നു
            
            // വാട്സാപ്പിലേക്ക്
            const myNumber = "919895993822"; // നിങ്ങളുടെ നമ്പർ ഇവിടെ മാറ്റുക
            const msg = " അഡ്മിഷൻ ഫോം പൂരിപ്പിച്ചിട്ടുണ്ട്. PDF താഴെ അയക്കുന്നു.";
            window.location.href = `https://wa.me/${myNumber}?text=${encodeURIComponent(msg)}`;
        });
    }
</script>

</body>
</html>
